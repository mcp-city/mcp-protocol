name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-python:
    name: Test Python Client
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd python
        pip install -e .
        pip install pytest pytest-asyncio
    
    - name: Run tests
      run: |
        cd python
        pytest tests/ -v

  test-javascript:
    name: Test JavaScript Client
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd javascript
        npm install
    
    - name: Run tests
      run: |
        cd javascript
        npm test

  test-rust:
    name: Test Rust CLI
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
    
    - name: Run tests
      run: |
        cd cli
        cargo test --verbose
    
    - name: Build CLI
      run: |
        cd cli
        cargo build --release

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Lint Python
      run: |
        pip install flake8
        flake8 python/mcp_protocol --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Lint JavaScript
      run: |
        cd javascript
        npm install
        npm run lint || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [test-python, test-javascript, test-rust, lint]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
    
    - name: Build CLI release
      run: |
        cd cli
        cargo build --release
    
    - name: Upload CLI binary
      uses: actions/upload-artifact@v3
      with:
        name: mcp-cli-linux
        path: cli/target/release/mcp-cli
